<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Unified Learning Hub</title>
    <meta name="description" content="Create an account on OFITS" />
    <link rel="stylesheet" href="register.css">

  </head>

  <body>
    <main class="page">
      <section class="card" aria-label="Register">
        <header class="cardHeader">
          <div class="brand">
            <img src="mits.png" alt="College Logo" class="college-logo">
            <div>
              <h1>Create your account</h1>
              <p class="subtitle">
                MITS Gwalior
              </p>
            </div>
          </div>
        </header>

        <div class="cardBody">
          <form id="registerForm" method="post">
            <label for="name">
              Name
              <input
                id="name"
                name="name"
                type="text"
                autocomplete="name"
                placeholder="Your full name"
                required
              />
            </label>

            <label for="email">
              Email
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="Enter your college email"
                required
              />
            </label>

            <div class="row">
              <label for="password">
                Password
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="new-password"
                  placeholder="Create a password"
                  required
                  minlength="6"
                />
              </label>

              <label for="confirmPassword">
                Confirm Password
                <input
                  id="confirmPassword"
                  name="confirmPassword"
                  type="password"
                  autocomplete="new-password"
                  placeholder="Repeat password"
                  required
                  minlength="6"
                />
              </label>
            </div>

            <label for="role">
              Resister as....
              <select id="role" name="role" required>
                <option value="" selected disabled>Select your role</option>
                <option value="student">Student</option>
                <option value="admin">Admin</option>
              </select>
            </label>

            <button class="button" type="submit">Register</button>

            <p class="footer">
              <span>Already have an account?</span>
              <a href="login.html">Back to login</a>
              <span class="srOnly">Login page</span>
            </p>
          </form>
        </div>
      </section>
    </main>
    <script src="register.js"></script>
  </body>
</html>
